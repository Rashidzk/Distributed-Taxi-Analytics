services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: taxi
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_db:/var/lib/postgresql/data

  superset-db:
    image: postgres:15
    container_name: superset-db
    environment:
      POSTGRES_DB: superset
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
    volumes:
      - superset_db:/var/lib/postgresql/data

  superset-redis:
    image: redis:7
    container_name: superset-redis

  superset:
    image: apache/superset:latest
    container_name: superset
    depends_on:
      - superset-db
      - superset-redis
      - clickhouse
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: your_superset_secret_key_change_me
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:superset@superset-db:5432/superset
    volumes:
      - ./superset:/app/pythonpath
    command: >
      /bin/sh -c '
      pip install clickhouse-connect &&
      superset db upgrade &&
      superset fab create-admin \
        --username admin \
        --firstname Admin \
        --lastname User \
        --email admin@example.com \
        --password admin || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      '
  spark-master:
    image: apache/spark:3.5.1-python3
    container_name: spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

  spark-worker-1:
    image: apache/spark:3.5.1-python3
    container_name: spark-worker-1
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./data:/opt/spark/data

  spark-worker-2:
    image: apache/spark:3.5.1-python3
    container_name: spark-worker-2
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./data:/opt/spark/data
  
  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow-init
    user: "0:0"
    depends_on:
      - clickhouse
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs #
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - airflow_home:/opt/airflow
    command: >
      bash -c "
      mkdir -p /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins &&
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
      "

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    user: "0:0"
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"

    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs #
      - ./scripts:/opt/airflow/scripts
      - ./spark/jobs:/opt/airflow/spark/jobs
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock
      - airflow_home:/opt/airflow
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    user: "0:0"
    depends_on:
      - airflow-webserver
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs #
      - ./scripts:/opt/airflow/scripts
      - ./spark/jobs:/opt/airflow/spark/jobs
      - ./data:/opt/airflow/data
      - /var/run/docker.sock:/var/run/docker.sock
      - airflow_home:/opt/airflow
    command: scheduler
volumes:
  airflow_logs:
  airflow_home:
  postgres_db:
  superset_db: